<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DotWave Shapes Example</title>

    <style>
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .demo {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 350px;
        }

        .demo h2 {
            color: white;
            text-shadow: 0 0 8px black;
        }
    </style>
</head>

<body>
    <!-- Built-in shapes: square -->
    <div id="demo-squares" class="demo">
        <h2>dotShape: 'square'</h2>
    </div>

    <!-- Built-in shapes: triangle (points in the direction of travel) -->
    <div id="demo-triangles" class="demo">
        <h2>dotShape: 'triangle'</h2>
    </div>

    <!-- Built-in shapes: star -->
    <div id="demo-stars" class="demo">
        <h2>dotShape: 'star'</h2>
    </div>

    <!-- Image dots: any image URL works, here an inline SVG snowflake -->
    <div id="demo-image" class="demo">
        <h2>dotShape: 'image' (snowflakes)</h2>
    </div>

    <!-- Custom shape function: a diamond traced by your own code -->
    <div id="demo-custom" class="demo">
        <h2>dotShape: custom function (diamonds)</h2>
    </div>

    <script src="/src/dotwave.js"></script>
    <script>
        // Square dots
        new DotWave({
            container: '#demo-squares',
            dotShape: 'square',
            dotColor: '#33a6ed',
            dotMinSize: 2,
            dotMaxSize: 5,
        });

        // Triangle dots rotate towards their direction of travel
        // when dot stretching is enabled (it is by default)
        new DotWave({
            container: '#demo-triangles',
            dotShape: 'triangle',
            dotColor: '#a6ed33',
            dotMinSize: 2,
            dotMaxSize: 6,
        });

        // Star dots look best a bit bigger and without stretching
        new DotWave({
            container: '#demo-stars',
            dotShape: 'star',
            dotColor: 'gold',
            dotMinSize: 2,
            dotMaxSize: 7,
            dotStretch: false,
        });

        // Image dots: pass any image URL (PNG, SVG, ...) via dotImage.
        // This example uses an inline SVG so it works without extra files.
        // Bump the dot sizes up, the defaults are too small for images.
        const snowflake = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><g stroke='%23bde7ff' stroke-width='3' stroke-linecap='round'><path d='M16 2v28M2 16h28M6 6l20 20M26 6L6 26'/></g></svg>";
        new DotWave({
            container: '#demo-image',
            dotShape: 'image',
            dotImage: snowflake,
            dotMinSize: 3,
            dotMaxSize: 9,
            dotStretch: false,
            motion: 'stream',       // Combine with a downward stream for a snowfall effect
            motionAngle: 90,
            motionStrength: 0.05,
        });

        // Custom shape function: trace any path centered at (0, 0).
        // DotWave handles position, rotation, stretching and filling.
        new DotWave({
            container: '#demo-custom',
            dotShape: function(ctx, radius) {
                ctx.moveTo(0, -radius);
                ctx.lineTo(radius, 0);
                ctx.lineTo(0, radius);
                ctx.lineTo(-radius, 0);
                ctx.closePath();
            },
            dotColor: '#ed33a6',
            dotMinSize: 2,
            dotMaxSize: 6,
        });
    </script>
</body>
</html>
